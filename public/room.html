<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chainword - Waiting Room</title>
    <link rel="stylesheet" href="lobby-style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <div class="cheerful-bg">
      <div class="bg-blob blob-1"></div>
      <div class="bg-blob blob-2"></div>
      <div class="bg-blob blob-3"></div>
    </div>

    <div class="app-container">
      <div class="waiting-room">
        <div class="waiting-card">
          <div class="waiting-header">
            <button id="leave-room-btn" class="btn-secondary">
              <i class="fas fa-arrow-left"></i> Keluar
            </button>
            <div class="room-code-box">
              Kode: <strong id="room-code-display"></strong>
            </div>
          </div>
          <div class="waiting-body">
            <h2 id="waiting-room-name">Memuat Room...</h2>
            <div class="room-meta">
              <span><i class="fas fa-users"></i> <span id="player-count">0</span>/<span id="max-players-display">4</span></span>
              <span><i class="fas fa-globe" id="room-type-icon"></i> <span id="room-type-display">Public</span></span>
              <span><i class="fas fa-gamepad"></i> <span id="room-category-display">-</span></span>
              <span><i class="fas fa-hourglass-half"></i> <span id="turn-time-display">0</span> detik</span>
            </div>
            <div class="players-grid" id="players-grid"></div>

            <div id="host-controls" class="host-panel hidden">
              <h3>👑 Host Controls</h3>
              <div class="host-settings">
                <select id="host-category-select">
                  <option value="random">🎲 Random</option>
                  <option value="hewan">🐾 Hewan</option>
                  <option value="buah">🍎 Buah</option>
                  <option value="negara">🌏 Negara</option>
                  <option value="teknologi">💻 Teknologi</option>
                  <option value="umum">📚 Umum</option>
                </select>
                <input type="number" id="host-turn-time" value="15" min="5" max="30" /> detik
                <button id="update-settings-btn" class="btn-secondary">Update</button>
              </div>
              <button id="force-start-btn" class="btn-start">🚀 Mulai Game!</button>
            </div>

            <div id="waiting-message" class="waiting-message">
              <div class="pulse"></div>
              Menunggu host memulai...
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="room.js"></script>
  </body>
</html>
