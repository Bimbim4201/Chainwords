<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chainwords - Start</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(145deg, #f9f3e6 0%, #ffe6f0 100%);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* Animasi background blobs */
      .bg-blob {
        position: fixed;
        border-radius: 50%;
        opacity: 0.4;
        animation: float 20s infinite ease-in-out;
        z-index: 0;
      }

      .blob-1 {
        width: 500px;
        height: 500px;
        background: #ffb347;
        top: -150px;
        right: -150px;
      }

      .blob-2 {
        width: 600px;
        height: 600px;
        background: #6a5acd;
        bottom: -200px;
        left: -150px;
        animation-delay: 5s;
      }

      .blob-3 {
        width: 350px;
        height: 350px;
        background: #ff6b6b;
        top: 40%;
        right: 10%;
        animation-delay: 10s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(30px, -20px) scale(1.05);
        }
      }

      /* Particle canvas */
      #particle-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      /* Start Card */
      .start-card {
        position: relative;
        z-index: 10;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        border-radius: 60px;
        padding: 48px 64px;
        text-align: center;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.15),
          0 0 0 1px rgba(255, 255, 255, 0.6);
        transform: scale(1);
        transition: transform 0.3s ease;
        animation: fadeInUp 0.6s ease-out;
      }

      .start-card:hover {
        transform: scale(1.02);
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Logo */
      .logo {
        margin-bottom: 24px;
      }

      .brand-icon {
        font-size: 72px;
        color: #ff8c42;
        position: relative;
        display: inline-block;
      }

      .crown-icon {
        font-size: 32px;
        color: #ffd700;
        position: absolute;
        top: -10px;
        right: -15px;
      }

      h1 {
        font-size: 56px;
        font-weight: 800;
        background: linear-gradient(135deg, #ff8c42, #ff3b6f);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: 2px;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 18px;
        color: #6a6a8a;
        margin-bottom: 36px;
      }

      /* Start Button */
      .btn-start {
        background: linear-gradient(135deg, #ff8c42, #ff3b6f);
        border: none;
        padding: 18px 48px;
        border-radius: 60px;
        color: white;
        font-weight: 700;
        font-size: 22px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        transition: all 0.3s ease;
        box-shadow: 0 8px 20px rgba(255, 59, 111, 0.3);
      }

      .btn-start i {
        font-size: 24px;
        transition: transform 0.2s ease;
      }

      .btn-start:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 30px rgba(255, 59, 111, 0.4);
      }

      .btn-start:hover i {
        transform: translateX(5px);
      }

      .btn-start:active {
        transform: translateY(2px);
      }

      /* Footer */
      .footer {
        margin-top: 36px;
        font-size: 12px;
        color: #a0a0b0;
      }

      /* Responsive */
      @media (max-width: 550px) {
        .start-card {
          padding: 32px 24px;
          margin: 20px;
        }
        h1 {
          font-size: 40px;
        }
        .brand-icon {
          font-size: 52px;
        }
        .crown-icon {
          font-size: 24px;
          right: -10px;
        }
        .btn-start {
          padding: 14px 32px;
          font-size: 18px;
        }
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
    <canvas id="particle-canvas"></canvas>

    <div class="start-card">
      <div class="logo">
        <div class="brand-icon">
          <i class="fas fa-link"></i>
          <i class="fas fa-crown crown-icon"></i>
        </div>
      </div>
      <h1>CHAINWORDS</h1>
      <p class="subtitle">✨ Battle of Words ✨</p>

      <button class="btn-start" id="start-btn">
        <span>START GAME</span>
        <i class="fas fa-arrow-right"></i>
      </button>

      <div class="footer">
        <i class="fas fa-users"></i> Join the battle &nbsp;&nbsp;|&nbsp;&nbsp;
        <i class="fas fa-trophy"></i> Top your words
      </div>
    </div>

    <script>
      // Particle effect (sama seperti di lobby biar konsisten)
      const canvas = document.getElementById("particle-canvas");

      function initParticles() {
        if (!canvas) return;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext("2d");

        const particles = [];
        const particleCount = 50;

        for (let i = 0; i < particleCount; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 3 + 1,
            alpha: Math.random() * 0.5 + 0.2,
            speedX: (Math.random() - 0.5) * 0.5,
            speedY: (Math.random() - 0.5) * 0.3,
          });
        }

        function animate() {
          if (!canvas || !ctx) return;
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (let p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 140, 66, ${p.alpha})`;
            ctx.fill();

            p.x += p.speedX;
            p.y += p.speedY;

            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
          }

          requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener("resize", () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        });
      }

      initParticles();

      // Tombol Start - redirect ke lobby
      const startBtn = document.getElementById("start-btn");
      startBtn.addEventListener("click", () => {
        // Efek klik dulu sedikit
        startBtn.style.transform = "scale(0.98)";
        setTimeout(() => {
          // Redirect ke halaman lobby
          window.location.href = "lobby.html";
        }, 150);
      });

      // Efek hover dikit reset style
      startBtn.addEventListener("mouseleave", () => {
        startBtn.style.transform = "";
      });
    </script>
  </body>
</html>
